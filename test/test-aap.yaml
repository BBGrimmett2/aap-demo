---
- name: Test AnsibleAutomationPlatform
  hosts: localhost
  gather_facts: true
  tasks:

    - name: Prep localhost for atf test suites
      ansible.builtin.include_role:
        name: aapqa.atf.testsuites
        tasks_from: prep_localhost
      when: atf_setup | default(true) | bool

    - name: Setup atf test suites
      ansible.builtin.include_role:
        name: aapqa.atf.testsuites
        tasks_from: setup
      when: atf_setup | default(true) | bool

    - name: Create atf tsd file
      ansible.builtin.include_role:
        name: aapqa.atf.testsuites
        tasks_from: create_tsd
      vars:
        installer_inventory: "{{ atf_artifacts_dir }}/atf_installer_inventory"
        provisioner_inventory: "{{ atf_artifacts_dir }}/atf_installer_inventory"

    - name: Run test-suite tests
      ansible.builtin.include_role:
        name: aapqa.atf.testsuites
        tasks_from: run_tests
