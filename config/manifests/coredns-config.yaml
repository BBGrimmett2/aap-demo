# 1. Waits for the router service to be available
# 2. Gets the dynamic ClusterIP
# 3. Patches the CoreDNS ConfigMap with the correct IP
#
# This file is kept here for documentation purposes only.
# The actual CoreDNS configuration is applied by dev/aap-demo/setup-coredns.sh
