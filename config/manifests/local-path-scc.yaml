# SecurityContextConstraints for local-path-provisioner on MicroShift
# Allows helper pods to use hostPath volumes
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: local-path-provisioner
allowHostDirVolumePlugin: true
allowPrivilegedContainer: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:local-path-storage:local-path-provisioner-service-account
volumes:
  - hostPath
  - configMap
  - emptyDir
  - secret
